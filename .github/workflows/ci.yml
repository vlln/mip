name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: make build VERSION=ci

      - name: Smoke test
        run: |
          ./bin/mip version --json
          ./bin/mip rewrite nginx:1.27 --plain

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archives
        run: make release VERSION=${GITHUB_REF_NAME#v}

      - name: List artifacts
        run: |
          find dist -maxdepth 1 -type f -printf '%f\n' | sort
          sed -n '1,20p' dist/checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: vlln/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.HOMEBREW }}

      - name: Update Homebrew formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          checksums="dist/checksums.txt"
          sha() {
            awk -v file="$1" '$2 == "./" file { print $1 }' "${checksums}"
          }

          darwin_amd64="mip_${version}_darwin_amd64.tar.gz"
          darwin_arm64="mip_${version}_darwin_arm64.tar.gz"
          linux_amd64="mip_${version}_linux_amd64.tar.gz"
          linux_arm64="mip_${version}_linux_arm64.tar.gz"

          for file in "${darwin_amd64}" "${darwin_arm64}" "${linux_amd64}" "${linux_arm64}"; do
            if [ -z "$(sha "${file}")" ]; then
              echo "missing checksum for ${file}" >&2
              exit 1
            fi
          done

          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/mip.rb <<EOF
          class Mip < Formula
            desc "Pull container images through registry-aware mirrors"
            homepage "https://github.com/vlln/mip"
            version "${version}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/vlln/mip/releases/download/v#{version}/${darwin_amd64}"
                sha256 "$(sha "${darwin_amd64}")"
              end

              on_arm do
                url "https://github.com/vlln/mip/releases/download/v#{version}/${darwin_arm64}"
                sha256 "$(sha "${darwin_arm64}")"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/vlln/mip/releases/download/v#{version}/${linux_amd64}"
                sha256 "$(sha "${linux_amd64}")"
              end

              on_arm do
                url "https://github.com/vlln/mip/releases/download/v#{version}/${linux_arm64}"
                sha256 "$(sha "${linux_arm64}")"
              end
            end

            def install
              bin.install "mip"
            end

            test do
              system "#{bin}/mip", "version"
            end
          end
          EOF

      - name: Commit Homebrew formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mip.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged"
            exit 0
          fi
          git commit -m "Update mip to ${GITHUB_REF_NAME}"
          git push
