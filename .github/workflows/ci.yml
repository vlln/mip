name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: make build VERSION=ci

      - name: Smoke test
        run: |
          ./bin/mip version --json
          ./bin/mip rewrite nginx:1.27 --plain

  release-dry-run:
    name: Release dry-run
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archives
        run: make release VERSION=${GITHUB_REF_NAME#v}

      - name: List artifacts
        run: |
          find dist -maxdepth 1 -type f -printf '%f\n' | sort
          sed -n '1,20p' dist/checksums.txt

